<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK 게임 통계 대시보드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 32px 20px 60px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(90deg, #4bc8d8, #e84887);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .subtitle { font-size: 13px; color: #aaa; }

        /* 요약 카드 */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            max-width: 720px;
            margin: 0 auto 28px;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 22px 12px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .card-icon { font-size: 30px; margin-bottom: 8px; }
        .card-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
        .card-value { font-size: 42px; font-weight: 900; line-height: 1; }
        .card.total .card-value  { color: #4bc8d8; }
        .card.success .card-value { color: #5de88a; }
        .card.fail .card-value    { color: #e84887; }

        /* 성공률 바 */
        .rate-box {
            max-width: 720px;
            margin: 0 auto 28px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .rate-title { font-size: 14px; color: #ccc; font-weight: 700; margin-bottom: 12px; }

        .bar-wrap {
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            height: 18px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .bar-success { background: linear-gradient(90deg, #3bc8d8, #5de88a); }
        .bar-fail    { background: linear-gradient(90deg, #e84887, #f97316); }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }

        /* 날짜별 테이블 */
        .daily-section {
            max-width: 720px;
            margin: 0 auto 24px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #ccc;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            background: rgba(75,200,216,0.15);
            padding: 10px 14px;
            text-align: center;
            color: #4bc8d8;
            font-weight: 700;
            font-size: 13px;
        }

        tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
        tbody tr:hover { background: rgba(255,255,255,0.07); }

        tbody td {
            padding: 10px 14px;
            text-align: center;
            color: #ddd;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .td-date { color: #fff; font-weight: 700; }
        .td-success { color: #5de88a; font-weight: 700; }
        .td-fail    { color: #e84887; font-weight: 700; }
        .td-rate    { color: #fbbf24; font-weight: 700; }

        /* 액션 버튼 */
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 720px;
            margin: 0 auto 20px;
        }

        button {
            padding: 10px 24px;
            border: none;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
        }

        button:active { transform: scale(0.96); opacity: 0.85; }
        .btn-refresh { background: #4bc8d8; color: #fff; }
        .btn-excel   { background: #22c55e; color: #fff; }
        .btn-game    { background: linear-gradient(90deg, #e84887, #f97316); color: #fff; }

        .last-time {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-bottom: 24px;
        }

        .loading { text-align: center; padding: 40px; color: #888; }
        .empty   { text-align: center; padding: 20px; color: #666; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <h1>🎮 MK 게임 통계 대시보드</h1>
    <p class="subtitle">도파민 10초 디톡스 · 참여 현황 (실시간)</p>
</header>

<div class="actions">
    <button class="btn-refresh" onclick="load()">🔄 새로고침</button>
    <button class="btn-excel"   onclick="downloadExcel()">📥 엑셀 다운로드</button>
    <button class="btn-game"    onclick="location.href='mk.html'">🎮 게임 열기</button>
</div>

<div class="summary-cards">
    <div class="card total">
        <div class="card-icon">👥</div>
        <div class="card-label">총 참여 횟수</div>
        <div class="card-value" id="val-total">-</div>
    </div>
    <div class="card success">
        <div class="card-icon">🏆</div>
        <div class="card-label">성공</div>
        <div class="card-value" id="val-success">-</div>
    </div>
    <div class="card fail">
        <div class="card-icon">💔</div>
        <div class="card-label">실패</div>
        <div class="card-value" id="val-fail">-</div>
    </div>
</div>

<div class="rate-box">
    <div class="rate-title">📊 성공률 / 실패율</div>
    <div class="bar-wrap">
        <div class="bar-fill bar-success" id="bar-success" style="width:0%"></div>
    </div>
    <div class="bar-wrap">
        <div class="bar-fill bar-fail" id="bar-fail" style="width:0%"></div>
    </div>
    <div class="bar-labels">
        <span>성공 <strong id="pct-success">0</strong>%</span>
        <span>실패 <strong id="pct-fail">0</strong>%</span>
    </div>
</div>

<p class="last-time" id="last-time">마지막 플레이: -</p>

<div class="daily-section">
    <div class="section-title">📅 날짜별 참여 현황</div>
    <table id="daily-table">
        <thead>
            <tr>
                <th>날짜</th>
                <th>참여 수</th>
                <th>성공</th>
                <th>실패</th>
                <th>성공률</th>
            </tr>
        </thead>
        <tbody id="daily-tbody">
            <tr><td colspan="5" class="loading">데이터 불러오는 중...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let rawDaily = [];

    async function load() {
        try {
            const res = await fetch('/api/game/mk/stats');
            const data = await res.json();

            if (!data.success) throw new Error('API 오류');

            const { total, success, fail, daily, lastPlayed } = data;
            rawDaily = daily || [];

            // 요약 카드
            document.getElementById('val-total').textContent = total.toLocaleString();
            document.getElementById('val-success').textContent = success.toLocaleString();
            document.getElementById('val-fail').textContent = fail.toLocaleString();

            // 성공률 바
            const completed = success + fail;
            const sPct = completed > 0 ? Math.round((success / completed) * 100) : 0;
            const fPct = completed > 0 ? Math.round((fail / completed) * 100) : 0;

            document.getElementById('bar-success').style.width = sPct + '%';
            document.getElementById('bar-success').textContent = sPct > 10 ? sPct + '%' : '';
            document.getElementById('bar-fail').style.width = fPct + '%';
            document.getElementById('bar-fail').textContent = fPct > 10 ? fPct + '%' : '';
            document.getElementById('pct-success').textContent = sPct;
            document.getElementById('pct-fail').textContent = fPct;

            // 마지막 플레이
            if (lastPlayed) {
                const d = new Date(lastPlayed);
                document.getElementById('last-time').textContent =
                    `마지막 플레이: ${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR')}`;
            }

            // 날짜별 테이블
            const tbody = document.getElementById('daily-tbody');
            if (rawDaily.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">데이터 없음</td></tr>';
                return;
            }

            tbody.innerHTML = rawDaily.map(row => {
                const comp = row.success + row.fail;
                const pct = comp > 0 ? Math.round((row.success / comp) * 100) : 0;
                return `<tr>
                    <td class="td-date">${row.date}</td>
                    <td>${row.total.toLocaleString()}</td>
                    <td class="td-success">${row.success.toLocaleString()}</td>
                    <td class="td-fail">${row.fail.toLocaleString()}</td>
                    <td class="td-rate">${pct}%</td>
                </tr>`;
            }).join('');

        } catch (e) {
            console.error(e);
            document.getElementById('daily-tbody').innerHTML =
                '<tr><td colspan="5" class="empty">데이터 불러오기 실패 — 서버를 확인하세요</td></tr>';
        }
    }

    function downloadExcel() {
        if (rawDaily.length === 0) {
            alert('다운로드할 데이터가 없습니다.');
            return;
        }

        // BOM + CSV 생성 (Excel 한글 깨짐 방지)
        const BOM = '\uFEFF';
        const header = ['날짜', '참여 수', '성공', '실패', '성공률(%)'];
        const rows = rawDaily.map(row => {
            const comp = row.success + row.fail;
            const pct = comp > 0 ? Math.round((row.success / comp) * 100) : 0;
            return [row.date, row.total, row.success, row.fail, pct];
        });

        const csv = BOM + [header, ...rows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);

        const today = new Date().toISOString().slice(0, 10);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mk_game_stats_${today}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    load();
    setInterval(load, 10000); // 10초 자동 갱신
</script>
</body>
</html>
